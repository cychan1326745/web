<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSE 物理题库｜筛选系统</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { max-width: 950px; margin: 0 auto; padding: 20px; background: #f5f7fa; }
    .filter-panel {
      background: #fff; padding: 16px; border-radius: 10px;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
      gap: 10px; margin-bottom: 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    select, input, button { padding: 9px; border: 1px solid #ccc; border-radius: 6px; font-size:14px; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .question-card {
      background: white; padding: 16px; border-radius: 8px; margin:12px 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .question-card img { width:100%; max-width:750px; margin:10px 0; }
    .meta { font-size:13px; color:#666; margin-bottom:8px; }
    .explain { margin-top:10px; padding:10px; background:#f0f4ff; border-radius:6px; font-size:14px; }
  </style>
</head>
<body>
  <h2>DSE 物理题库筛选系统</h2>

  <div class="filter-panel">
    <select id="subject">
      <option value="">全部科目</option>
      <option value="phy">物理（phy）</option>
    </select>

    <select id="chapter">
      <option value="">全部章节</option>
      <option value="ch02">ch02</option>
    </select>

    <select id="large_topic">
      <option value="">全部大主题</option>
      <option value="內能與熱傳遞">內能與熱傳遞</option>
    </select>

    <select id="small_topic">
      <option value="">全部小主题</option>
      <option value="內能與熱傳遞">內能與熱傳遞</option>
    </select>

    <select id="diff">
      <option value="">全部难度</option>
      <option value="easy">easy</option>
      <option value="avg">avg</option>
    </select>

    <input type="number" id="q_no" placeholder="题号">
    <input type="number" id="yr" placeholder="年份">
    <button onclick="loadFilteredQuestions()">查询题目</button>
  </div>

  <div id="questionList"></div>

  <script>
    // 已自动填入你的 Supabase 资料
    const SUPABASE_URL = "https://ltqkxlqierywjnhhdigf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_O1Df1XJuwvBWm0b--wSkaA_S7Wt-InC";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadFilteredQuestions() {
      const list = document.getElementById("questionList");
      list.innerHTML = "<p>正在加载...</p>";

      // 先拉取所有题目，看看数据库里到底有没有数据
      const { data: allData, error: allError } = await supabaseClient.from("questions").select("*");
      console.log("数据库里的所有题目：", allData, allError);

      if (allError) {
        list.innerHTML = `<p>数据库连接失败：${allError.message}</p>`;
        return;
      }

      if (allData.length === 0) {
        list.innerHTML = "<p>数据库里没有任何题目数据，请先录入题目！</p>";
        return;
      }

      // 再执行带筛选的查询
      const subject = document.getElementById("subject").value;
      const chapter = document.getElementById("chapter").value;
      const largeTopic = document.getElementById("large_topic").value;
      const smallTopic = document.getElementById("small_topic").value;
      const diff = document.getElementById("diff").value;
      const qNo = document.getElementById("q_no").value;
      const yr = document.getElementById("yr").value;

      let query = supabaseClient.from("questions").select("*");

      // 修复：当不选科目时，不添加 subject 筛选条件，直接查所有
      if (subject) query = query.eq("subject", subject);
      if (chapter) query = query.eq("chapter", chapter);
      if (largeTopic) query = query.eq("large_topic", largeTopic);
      if (smallTopic) query = query.eq("small_topic", smallTopic);
      if (diff) query = query.eq("diff", diff);
      if (qNo) query = query.eq("q_no", qNo);
      if (yr) query = query.eq("yr", yr);

      const { data, error } = await query;
      console.log("筛选后的题目：", data, error);

      if (error) {
        list.innerHTML = `<p>查询失败：${error.message}</p>`;
        return;
      }
      if (data.length === 0) {
        list.innerHTML = `<p>暂无符合条件的题目（数据库里共有 ${allData.length} 条题目）</p>`;
        return;
      }

      list.innerHTML = "";
      data.forEach(q => {
        list.innerHTML += `
        <div class="question-card">
          <div class="meta">
            科目：${q.subject}｜章节：${q.chapter}｜题号：${q.q_no}｜难度：${q.diff || "未设置"}｜类型：${q.q_type || "未设置"}
          </div>
          <div class="meta">
            大主题：${q.large_topic || "无"}｜小主题：${q.small_topic || "无"}｜年份：${q.yr || "无"}｜来源：${q.source || "无"}
          </div>
          ${q.png_link ? `<img src="${q.png_link}" alt="题目图片">` : "<p>暂无题目图片</p>"}
          <p><strong>答案：</strong>${q.ans || "未录入"}</p>
          ${q.explain ? `<div class="explain"><strong>解析：</strong>${q.explain}</div>` : ""}
          ${q.exp_link ? `<p><a href="${q.exp_link}" target="_blank">查看解析链接</a></p>` : ""}
        </div>`;
      });
    }

    window.onload = loadFilteredQuestions;
  </script>
</body>
</html>
