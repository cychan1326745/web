<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSE A物理题库｜筛选系统</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { max-width: 950px; margin: 0 auto; padding: 20px; background: #f5f7fa; }
    .filter-panel {
      background: #fff; padding: 16px; border-radius: 10px;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
      gap: 10px; margin-bottom: 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    select, input, button { padding: 9px; border: 1px solid #ccc; border-radius: 6px; font-size:14px; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .question-card {
      background: white; padding: 16px; border-radius: 8px; margin:12px 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .question-card img { width:100%; max-width:750px; margin:10px 0; }
    .meta { font-size:13px; color:#666; margin-bottom:8px; }
    .explain { margin-top:10px; padding:10px; background:#f0f4ff; border-radius:6px; font-size:14px; }
    .page-bar { margin-top:20px; text-align:center; }
    .page-btn { margin:0 4px; padding:8px 14px; }
  </style>
</head>
<body>
  <h2>DSE 物理题库筛选系统</h2>

  <div class="filter-panel">
    <select id="subject">
      <option value="">全部科目</option>
      <option value="phy">物理（phy）</option>
    </select>

    <select id="chapter">
      <option value="">全部章节</option>
      <option value="ch02">ch02</option>
    </select>

    <select id="large_topic">
      <option value="">全部大主题</option>
      <option value="內能與熱傳遞">內能與熱傳遞</option>
    </select>

    <select id="small_topic">
      <option value="">全部小主题</option>
      <option value="內能與熱傳遞">內能與熱傳遞</option>
    </select>

    <select id="diff">
      <option value="">全部难度</option>
      <option value="easy">easy</option>
      <option value="avg">avg</option>
    </select>

    <input type="number" id="q_no" placeholder="题号">
    <input type="number" id="yr" placeholder="年份">
    <button onclick="loadFilteredQuestions()">查询题目</button>
  </div>

  <div id="questionList"><p>请先设置筛选条件，再点击查询题目</p></div>
  <div class="page-bar" id="pageBar"></div>

  <script>
    // 已内置你嘅 Supabase 配置
    const SUPABASE_URL = "https://ltqkxlqierywjnhhdigf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_O1Df1XJuwvBWm0b--wSkaA_S7Wt-InC";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 分页设定：每页固定 20 题（最省流量最优值）
    const PER_PAGE = 20;
    let currentPage = 1;
    let totalCount = 0;

    // 获取筛选条件
    function getFilter(){
      return {
        subject: document.getElementById("subject").value,
        chapter: document.getElementById("chapter").value,
        largeTopic: document.getElementById("large_topic").value,
        smallTopic: document.getElementById("small_topic").value,
        diff: document.getElementById("diff").value,
        qNo: document.getElementById("q_no").value,
        yr: document.getElementById("yr").value
      }
    }

    async function loadFilteredQuestions(page = 1) {
      currentPage = page;
      const list = document.getElementById("questionList");
      const pageBar = document.getElementById("pageBar");
      list.innerHTML = "<p>正在加载...</p>";
      pageBar.innerHTML = "";

      const f = getFilter();

      // 1. 先计算符合条件总数（只查 id，极省流量）
      let countQuery = supabaseClient.from("questions").select("id", {count:"exact"});
      if(f.subject) countQuery = countQuery.eq("subject", f.subject);
      if(f.chapter) countQuery = countQuery.eq("chapter", f.chapter);
      if(f.largeTopic) countQuery = countQuery.eq("large_topic", f.largeTopic);
      if(f.smallTopic) countQuery = countQuery.eq("small_topic", f.smallTopic);
      if(f.diff) countQuery = countQuery.eq("diff", f.diff);
      if(f.qNo) countQuery = countQuery.eq("q_no", f.qNo);
      if(f.yr) countQuery = countQuery.eq("yr", f.yr);

      const {count} = await countQuery;
      totalCount = count;

      // 2. 只读取【必须显示】嘅字段，唔拉多余数据
      let query = supabaseClient
        .from("questions")
        .select("id,subject,chapter,q_no,diff,q_type,large_topic,small_topic,yr,source,png_link,ans,explain");

      // 分页范围
      const from = (page - 1) * PER_PAGE;
      const to = from + PER_PAGE - 1;
      query = query.range(from, to);

      // 应用筛选条件
      if(f.subject) query = query.eq("subject", f.subject);
      if(f.chapter) query = query.eq("chapter", f.chapter);
      if(f.largeTopic) query = query.eq("large_topic", f.largeTopic);
      if(f.smallTopic) query = query.eq("small_topic", f.smallTopic);
      if(f.diff) query = query.eq("diff", f.diff);
      if(f.qNo) query = query.eq("q_no", f.qNo);
      if(f.yr) query = query.eq("yr", f.yr);

      const { data, error } = await query;

      if (error) {
        list.innerHTML = `<p>查询失败：${error.message}</p>`;
        return;
      }
      if (data.length === 0) {
        list.innerHTML = "<p>暂无符合条件的题目</p>";
        return;
      }

      list.innerHTML = "";
      data.forEach(q => {
        list.innerHTML += `
        <div class="question-card">
          <div class="meta">
            科目：${q.subject}｜章节：${q.chapter}｜题号：${q.q_no}｜难度：${q.diff || "未设置"}｜类型：${q.q_type || "未设置"}
          </div>
          <div class="meta">
            大主题：${q.large_topic || "无"}｜小主题：${q.small_topic || "无"}｜年份：${q.yr || "无"}｜来源：${q.source || "无"}
          </div>
          ${q.png_link ? `<img src="${q.png_link}" alt="题目图片">` : "<p>暂无题目图片</p>"}
          <p><strong>答案：</strong>${q.ans || "未录入"}</p>
          ${q.explain ? `<div class="explain"><strong>解析：</strong>${q.explain}</div>` : ""}
        </div>`;
      });

      // 生成分页按钮
      const totalPage = Math.ceil(totalCount / PER_PAGE);
      if(totalPage > 1){
        let pageHtml = "";
        if(currentPage > 1) pageHtml += `<button class="page-btn" onclick="loadFilteredQuestions(${currentPage-1})">上一页</button>`;
        for(let i=1; i<=totalPage; i++){
          pageHtml += `<button class="page-btn" onclick="loadFilteredQuestions(${i})">${i}</button>`;
        }
        if(currentPage < totalPage) pageHtml += `<button class="page-btn" onclick="loadFilteredQuestions(${currentPage+1})">下一页</button>`;
        pageBar.innerHTML = pageHtml;
      }
    }

    // 取消自动加载，必须手动点击查询（最省流量关键）
    // window.onload = ()=> loadFilteredQuestions(1);
  </script>
</body>
</html>
